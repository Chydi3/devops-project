name: DevOps CI Pipeline

on:
  push:
    branches:
   name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t flaskapp:latest .

      - name: Verify build
        run: docker images
