name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Show version
        run: echo "Version is $VERSION"

     - name: Update APP_VERSION only
  run: |
    sed -i 's/name: APP_VERSION\n *value: ".*"/name: APP_VERSION\n          value: "'$VERSION'"/' web-deployment.yaml


      - name: Show updated deployment
        run: cat web-deployment.yaml
