apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: chydi3/flaskapp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7000
          env:
            - name: APP_VERSION
              value: "0bad943"
            - name: ENVIRONMENT
              value: "production"

